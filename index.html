<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケモンチャンピオンズ 暗記トレーナー</title>
<style>
  :root{
    --bg:#0f1320; --panel:#1a2032; --panel2:#222a40; --line:#323b57;
    --txt:#e8ecf6; --sub:#9aa6c4; --accent:#f7b733; --accent2:#4e9bff;
    --good:#3ddc84; --bad:#ff5d6c;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    background:linear-gradient(160deg,#0f1320,#141a2c);color:var(--txt);min-height:100vh}
  header{padding:14px 16px;border-bottom:1px solid var(--line);background:rgba(15,19,32,.85);
    position:sticky;top:0;z-index:10;backdrop-filter:blur(8px)}
  h1{font-size:18px;margin:0 0 10px;letter-spacing:.02em}
  h1 span{color:var(--accent)}
  .tabs{display:flex;gap:8px;flex-wrap:wrap}
  .tab{padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:var(--panel);
    color:var(--sub);cursor:pointer;font-size:14px;font-weight:600}
  .tab.active{background:var(--accent);color:#1a1300;border-color:var(--accent)}
  main{max-width:1080px;margin:0 auto;padding:16px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  select,input,button{font-family:inherit}
  select,input[type=text]{background:var(--panel);color:var(--txt);border:1px solid var(--line);
    border-radius:8px;padding:8px 10px;font-size:14px}
  .btn{background:var(--accent2);color:#fff;border:none;border-radius:8px;padding:9px 16px;
    font-size:14px;font-weight:700;cursor:pointer}
  .btn.ghost{background:var(--panel);color:var(--txt);border:1px solid var(--line)}
  .btn:active{transform:translateY(1px)}
  .muted{color:var(--sub);font-size:13px}

  /* grid list */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px;
    text-align:center;cursor:pointer;transition:.15s;position:relative}
  .pcard:hover{border-color:var(--accent2);transform:translateY(-2px)}
  .pcard .rank{position:absolute;top:8px;left:8px;font-size:11px;color:var(--sub);font-weight:700}
  .pcard .learned{position:absolute;top:6px;right:8px;font-size:14px}
  .pcard img{width:96px;height:96px;object-fit:contain;image-rendering:auto}
  .pcard .nm{font-weight:700;font-size:14px;margin-top:2px}
  .types{display:flex;gap:4px;justify-content:center;margin-top:6px;flex-wrap:wrap}
  .type{font-size:11px;padding:2px 8px;border-radius:999px;color:#fff;font-weight:700}

  /* detail / flashcard */
  .detail{max-width:480px;margin:0 auto}
  .flip{perspective:1200px}
  .flipinner{position:relative;transition:transform .5s;transform-style:preserve-3d;min-height:560px}
  .flip.flipped .flipinner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;background:var(--panel);
    border:1px solid var(--line);border-radius:18px;padding:18px;display:flex;flex-direction:column;align-items:center}
  .back{transform:rotateY(180deg);align-items:stretch;overflow-y:auto}
  .abrow{font-size:13px;margin:5px 0;line-height:1.45}
  .abrow b{color:var(--txt)} .abrow span{color:var(--sub)}
  .moves{display:flex;flex-direction:column;gap:4px}
  .moverow{display:flex;align-items:center;gap:8px;font-size:13px}
  .mvname{width:118px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mvbar{flex:1;height:8px;background:#0c1020;border-radius:4px;overflow:hidden}
  .mvbar span{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent))}
  .mvpct{width:42px;text-align:right;color:var(--sub);font-variant-numeric:tabular-nums}
  .face img{width:170px;height:170px;object-fit:contain}
  .front{overflow-y:auto}
  .front #fImg{width:130px;height:130px}
  .frontstats{width:100%;max-width:300px;margin:6px 0 2px}
  .onecard{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px}
  .cardhead{display:flex;gap:14px;align-items:center;margin-bottom:6px}
  .cardhead img{width:108px;height:108px;object-fit:contain;flex-shrink:0}
  .cardhead .bigname{font-size:20px;margin-bottom:4px}
  .bigname{font-size:22px;font-weight:800;margin-top:6px}
  .hint{color:var(--sub);margin-top:auto;font-size:13px}
  .statrow{display:flex;justify-content:space-between;align-items:center;margin:3px 0;font-size:14px}
  .statlbl{color:var(--sub);width:54px}
  .bar{flex:1;height:9px;background:#0c1020;border-radius:5px;margin:0 8px;overflow:hidden}
  .barfill{height:100%;border-radius:5px}
  .statval{width:34px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
  .sec{margin-top:10px}
  .sec h3{font-size:12px;color:var(--accent);margin:0 0 4px;letter-spacing:.04em}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:4px 9px;font-size:13px}
  .role{font-size:13px;color:var(--sub);line-height:1.5}
  .navrow{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:8px}
  .total{font-weight:800;color:var(--accent)}

  /* quiz */
  .quizsetup{max-width:520px;margin:0 auto;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:20px}
  .qopt{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);
    border-radius:10px;margin-bottom:8px;cursor:pointer}
  .qopt input{width:18px;height:18px}
  .quizbox{max-width:520px;margin:0 auto;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:20px;text-align:center}
  .qprompt{font-size:16px;margin:6px 0 4px;color:var(--sub)}
  .qmain{font-size:20px;font-weight:800;margin-bottom:14px}
  .qmain.small{font-size:15px;font-weight:600;line-height:1.7}
  .choices{display:grid;gap:10px}
  .choice{padding:13px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);
    color:var(--txt);font-size:15px;font-weight:600;cursor:pointer;text-align:center}
  .choice:hover{border-color:var(--accent2)}
  .choice.correct{background:var(--good);color:#06351c;border-color:var(--good)}
  .choice.wrong{background:var(--bad);color:#3a0007;border-color:var(--bad)}
  .choice:disabled{cursor:default}
  .qstat{display:flex;justify-content:space-between;font-size:13px;color:var(--sub);margin-bottom:10px}
  .qimg{width:150px;height:150px;object-fit:contain}
  .statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
  .statgrid div{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px}
  .statgrid b{display:block;font-size:18px}
  .statgrid small{color:var(--sub)}
  .result{text-align:center}
  .scorebig{font-size:46px;font-weight:900;color:var(--accent);margin:10px 0}
  .speedbox{max-width:520px;margin:0 auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px}
  .sprow{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
  .sprow label{color:var(--sub);font-size:14px;flex-shrink:0}
  .sprow select,.sprow input{flex:1;max-width:280px}
  .btngroup,.stepgroup{display:flex;gap:6px;flex:1;max-width:280px;justify-content:flex-end}
  .btngroup button{flex:1;padding:9px 4px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--sub);font-size:13px;font-weight:700;cursor:pointer}
  .btngroup button.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .stepgroup{align-items:center}
  .stepgroup button{width:46px;height:40px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--txt);font-size:18px;font-weight:800;cursor:pointer}
  .stepgroup button:active{transform:translateY(1px)}
  .stepgroup input{flex:1;text-align:center}
  .stepval{min-width:54px;text-align:center;font-size:20px;font-weight:800;font-variant-numeric:tabular-nums}
  .spcompare{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
  .spside{flex:1 1 320px;min-width:0;margin:0}
  .sptitle{font-weight:800;text-align:center;margin:0 0 12px;font-size:16px}
  .sptitle.L{color:var(--accent2)} .sptitle.R{color:var(--accent)}
  .spside .sprow label{min-width:48px}
  .spverdict{max-width:680px;margin:16px auto 0;text-align:center;font-size:17px;font-weight:800;min-height:26px}
  .dmgresult{max-width:680px;margin:16px auto 0;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;text-align:center}
  .dmgbig{font-size:30px;font-weight:900;color:var(--bad);margin:2px 0}
  .dmgpct{font-size:16px;color:var(--sub);margin-bottom:10px}
  .dmgko{font-size:20px;font-weight:800;margin:8px 0}
  .dmgbarwrap{height:16px;background:#0c1020;border-radius:8px;overflow:hidden;margin:10px 0;position:relative}
  .dmgbarwrap .lo{position:absolute;left:0;top:0;bottom:0;background:#f0a020;opacity:.5}
  .dmgbarwrap .hi{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#ff8a5c,#ff5d6c)}
  .dmgeff{display:inline-block;padding:3px 12px;border-radius:999px;font-size:13px;font-weight:700;margin-bottom:6px}
  .dmgmini{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:6px}
  .dmgmini label{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--sub);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:5px 9px;cursor:pointer}
  .dmgfield{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:680px;margin:14px auto 0}
  .dmgfield label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--sub);font-weight:700}
  .dmgfield select{min-width:120px}
  .spresult{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;display:grid;gap:10px}
  .spcard{display:flex;align-items:center;justify-content:space-between;background:var(--panel2);
    border:1px solid var(--line);border-radius:10px;padding:12px 16px}
  .spcard .lbl{font-size:14px;color:var(--sub)}
  .spcard .val{font-size:26px;font-weight:900;font-variant-numeric:tabular-nums}
  .spcard.main{border-color:var(--accent2)} .spcard.main .val{color:var(--accent2)}
  .spcard.scarf .val{color:#f0a020} .spcard.tail .val{color:var(--good)} .spcard.para .val{color:var(--bad)}
  .spcard small{color:var(--sub);font-size:11px;font-weight:400}
  .hidden{display:none}
  .feedback{min-height:24px;font-weight:700;margin:12px 0 4px}
  .feedback.ok{color:var(--good)} .feedback.ng{color:var(--bad)}
</style>
</head>
<body>
<header>
  <h1>ポケモン<span>チャンピオンズ</span> 暗記トレーナー <span style="font-size:12px;color:var(--sub);font-weight:400">シングル使用率 TOP100 ｜ シーズンM-3</span></h1>
  <div class="tabs">
    <div class="tab active" data-mode="list">📋 一覧</div>
    <div class="tab" data-mode="flash">🃏 カード暗記</div>
    <div class="tab" data-mode="quiz">❓ クイズ</div>
    <div class="tab" data-mode="speed">⚡ 素早さ計算</div>
    <div class="tab" data-mode="dmg">💥 ダメージ計算</div>
  </div>
</header>
<main>
  <!-- LIST -->
  <section id="view-list">
    <div class="controls">
      <input type="text" id="search" placeholder="🔍 名前・特性・技で検索">
      <select id="filterType"><option value="">全タイプ</option></select>
      <select id="filterRank">
        <option value="">全順位</option>
        <option value="1-10">1–10位</option>
        <option value="11-20">11–20位</option>
        <option value="21-30">21–30位</option>
        <option value="31-40">31–40位</option>
        <option value="41-50">41–50位</option>
        <option value="51-60">51–60位</option>
        <option value="61-70">61–70位</option>
        <option value="71-80">71–80位</option>
        <option value="81-90">81–90位</option>
        <option value="91-100">91–100位</option>
      </select>
      <span class="muted" id="listCount"></span>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <!-- FLASHCARD -->
  <section id="view-flash" class="hidden">
    <div class="controls" style="justify-content:center">
      <button class="btn ghost" id="shuffleBtn">🔀 シャッフル</button>
      <button class="btn ghost hidden" id="megaToggle">⚡ メガを見る</button>
      <label class="muted"><input type="checkbox" id="onlyUnlearned"> 未習得のみ</label>
      <span class="muted" id="flashCount"></span>
    </div>
    <div class="detail">
      <div class="onecard" id="fCard"></div>
      <div class="navrow">
        <button class="btn ghost" id="prevBtn">← 前</button>
        <button class="btn" id="learnBtn">覚えた ✓</button>
        <button class="btn ghost" id="nextBtn">次 →</button>
      </div>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="view-quiz" class="hidden">
    <div id="quizSetup" class="quizsetup">
      <h2 style="margin-top:0">クイズ設定</h2>
      <p class="muted">出題形式を選んでください（複数選択可）</p>
      <label class="qopt"><input type="checkbox" class="qtype" value="stat" checked> <b>種族値あて</b>：合計／素早さを4択で当てる</label>
      <label class="qopt"><input type="checkbox" class="qtype" value="ability" checked> <b>特性あて</b>：特性⇄ポケモンを当てる</label>
      <label class="qopt"><input type="checkbox" class="qtype" value="moves" checked> <b>技→ポケモン</b>：技構成から誰かを当てる</label>
      <label class="qopt"><input type="checkbox" class="qtype" value="reverse" checked> <b>逆引き</b>：種族値だけでポケモンを当てる（上級）</label>
      <div style="margin:14px 0 18px">
        <label class="muted">問題数：
          <select id="qCount"><option>10</option><option selected>15</option><option>20</option><option>30</option></select>
        </label>
      </div>
      <button class="btn" id="startQuiz" style="width:100%">スタート ▶</button>
    </div>

    <div id="quizPlay" class="quizbox hidden">
      <div class="qstat"><span id="qProgress"></span><span id="qScore"></span></div>
      <div id="qContent"></div>
      <div class="feedback" id="qFeedback"></div>
      <button class="btn hidden" id="qNext" style="width:100%">次へ →</button>
    </div>

    <div id="quizResult" class="quizbox result hidden">
      <h2 style="margin-top:0">結果</h2>
      <div class="scorebig" id="rScore"></div>
      <div class="muted" id="rDetail"></div>
      <div id="rReview" style="text-align:left;margin:16px 0"></div>
      <button class="btn" id="retryQuiz" style="width:100%">もう一度 🔁</button>
    </div>
  </section>

  <!-- SPEED CALC -->
  <section id="view-speed" class="hidden">
    <h2 style="text-align:center;margin:4px 0 12px">⚡ 素早さ比較</h2>
    <datalist id="spList"></datalist>
    <div class="spcompare" id="spCompare"></div>
    <div id="spVerdict" class="spverdict"></div>
    <p class="muted" style="font-size:12px;margin:12px auto 0;max-width:660px;text-align:center">※ レベル50・個体値31固定。努力値32＝最大投資。各補正は小数点切り捨て。スカーフ／追い風／まひはランク適用後の値への倍率です。</p>
  </section>

  <!-- DAMAGE CALC -->
  <section id="view-dmg" class="hidden">
    <h2 style="text-align:center;margin:4px 0 12px">💥 ダメージ計算</h2>
    <datalist id="dmgList"></datalist>
    <datalist id="dMoveList"></datalist>
    <div class="spcompare" id="dmgCompare"></div>
    <div class="dmgfield" id="dmgField">
      <label>天候 <select id="dWeather"><option value="none">なし</option><option value="sun">晴れ</option><option value="rain">雨</option><option value="sand">砂</option><option value="snow">雪</option></select></label>
      <label>フィールド <select id="dTerrain"><option value="none">なし</option><option value="electric">エレキ</option><option value="grassy">グラス</option><option value="psychic">サイコ</option><option value="misty">ミスト</option></select></label>
      <label>壁 <select id="dWall"><option value="none">なし</option><option value="reflect">リフレクター</option><option value="light">ひかりのかべ</option><option value="aurora">オーロラベール</option></select></label>
    </div>
    <div id="dmgResult" class="dmgresult"></div>
    <p class="muted" style="font-size:12px;margin:12px auto 0;max-width:680px;text-align:center">※ レベル50・個体値31固定。タイプ一致・タイプ相性は選んだポケモンから自動。乱数は16通り（85〜100%）。急所×1.5・やけど（物理）×0.5。</p>
  </section>
</main>

<script>
/* ===== データ：シングル使用率TOP50（シーズンM-3 / 2026-6-26時点・pokedb） ===== */
const TYPE_JP = {normal:"ノーマル",fire:"ほのお",water:"みず",grass:"くさ",electric:"でんき",
  ice:"こおり",fighting:"かくとう",poison:"どく",ground:"じめん",flying:"ひこう",psychic:"エスパー",
  bug:"むし",rock:"いわ",ghost:"ゴースト",dragon:"ドラゴン",dark:"あく",steel:"はがね",fairy:"フェアリー"};
const TYPE_COLOR = {normal:"#9099a1",fire:"#ff6b3d",water:"#4d90d5",grass:"#5dbe62",electric:"#f0c020",
  ice:"#74cec0",fighting:"#cf4068",poison:"#aa5fa6",ground:"#d8765e",flying:"#8fa8dd",psychic:"#f8567f",
  bug:"#90c12c",rock:"#c7b78b",ghost:"#5269ad",dragon:"#0a6dc4",dark:"#5a5366",steel:"#5a8ea1",fairy:"#ec8fe6"};

// id=全国図鑑番号(通常画像用), form=PokeAPI特殊フォルム画像ID
const P = [
 {r:1,jp:"ガブリアス",id:445,t:["dragon","ground"],ab:["すながくれ","さめはだ(隠)"],s:[108,130,95,80,85,102],mv:["じしん","ドラゴンクロー","つるぎのまい","ステルスロック"],role:"環境の軸。広い技範囲と役割の広さ。剣舞エース/ステロ撒き。"},
 {r:2,jp:"ミミッキュ",id:778,t:["ghost","fairy"],ab:["ばけのかわ"],s:[55,90,80,50,105,96],mv:["じゃれつく","シャドークロー","つるぎのまい","かげうち"],role:"ばけのかわで確実に起点化。いのちのたま＋剣舞で過去最高2位。"},
 {r:3,jp:"マスカーニャ",id:908,t:["grass","dark"],ab:["しんりょく","へんげんじざい(隠)"],s:[76,110,70,81,70,123],mv:["トリックフラワー","はたきおとす","とんぼがえり","わるだくみ"],role:"高速物理。確定急所トリックフラワー＋とんぼで撹乱。"},
 {r:4,jp:"ブリジュラス",id:1018,t:["steel","dragon"],ab:["スタミナ","がんじょう"],s:[90,105,130,125,65,85],mv:["ラスターカノン","りゅうせいぐん","でんじは","ボディプレス"],role:"高耐久＋高特攻の万能型。電気技/ボディプレスで起点不可。"},
 {r:5,jp:"メタグロス",id:376,t:["steel","psychic"],ab:["クリアボディ"],s:[80,135,130,95,90,70],mv:["コメットパンチ","アイアンヘッド","じしん","しねんのずつき"],role:"【メガ新解禁】かたいツメで超火力。鋼エスパーの物理エース。"},
 {r:6,jp:"ライチュウ",id:26,t:["electric"],ab:["せいでんき","ひらいしん(隠)"],s:[60,90,55,90,80,110],mv:["10まんボルト","なみのり","めざめるパワー","ボルトチェンジ"],role:"【メガ新解禁】高速の電気アタッカー。新メガで攻撃性能が大幅強化。"},

/* ===== ユーティリティ ===== */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(arr,n,exclude){const pool=arr.filter(x=>x!==exclude);return shuffle(pool).slice(0,n);}
function uniqueNums(correct,getter,n){
  const vals=new Set([correct]);const others=shuffle(P.map(getter).filter(v=>v!==correct));
  for(const v of others){if(vals.size>=n)break;vals.add(v);}
  return shuffle([...vals]);
}

/* ===== クイズ ===== */
let quizQueue=[],quizIdx=0,quizScore=0,quizWrong=[];
document.getElementById("startQuiz").onclick=()=>{
  const types=[...document.querySelectorAll(".qtype:checked")].map(c=>c.value);
  if(types.length===0){alert("出題形式を1つ以上選んでください");return;}
  const count=Number(document.getElementById("qCount").value);
  quizQueue=[];
  const pool=shuffle(P.slice());
  for(let i=0;i<count;i++){
    const p=pool[i%pool.length];
    const type=types[Math.floor(Math.random()*types.length)];
    quizQueue.push(buildQuestion(p,type));
  }
  quizIdx=0;quizScore=0;quizWrong=[];
  document.getElementById("quizSetup").classList.add("hidden");
  document.getElementById("quizResult").classList.add("hidden");
  document.getElementById("quizPlay").classList.remove("hidden");
  showQuestion();
};
function buildQuestion(p,type){
  if(type==="stat"){
    const useSpeed=Math.random()<0.5;
    const val=useSpeed?p.s[5]:p.total;
    const opts=uniqueNums(val,x=>useSpeed?x.s[5]:x.total,4);
    return{type,p,label:useSpeed?"このポケモンの<b>素早さ</b>種族値は？":"このポケモンの<b>合計</b>種族値は？",
      img:true,choices:opts.map(String),answer:String(val)};
  }
  if(type==="ability"){
    const dir=Math.random()<0.5;
    const mainAb=p.ab[0];
    if(dir){ // ポケモン→特性
      const opts=new Set([mainAb]);
      shuffle(P).forEach(q=>{if(opts.size<4&&q.ab[0]!==mainAb)opts.add(q.ab[0]);});
      return{type,p,label:"このポケモンの<b>特性</b>は？（主な特性）",img:true,
        choices:shuffle([...opts]),answer:mainAb};
    }else{ // 特性→ポケモン
      const wrong=sample(P,3,p);
      const choices=shuffle([p,...wrong]);
      return{type,p,label:`特性「<b>${mainAb}</b>」を持つのは？`,img:false,
        choices:choices.map(x=>x.jp),answer:p.jp};
    }
  }
  if(type==="moves"){
    const wrong=sample(P,3,p);
    const choices=shuffle([p,...wrong]);
    return{type,p,label:`この技構成のポケモンは？<br><span class="qmain small">${p.mv.join(" ／ ")}</span>`,
      img:false,choices:choices.map(x=>x.jp),answer:p.jp,noMain:true};
  }
  // reverse
  const wrong=sample(P,3,p);
  const choices=shuffle([p,...wrong]);
  return{type,p,label:"この種族値のポケモンは？",img:false,reverse:true,
    choices:choices.map(x=>x.jp),answer:p.jp};
}
function showQuestion(){
  const q=quizQueue[quizIdx];
  document.getElementById("qProgress").textContent=`第 ${quizIdx+1} / ${quizQueue.length} 問`;
  document.getElementById("qScore").textContent=`正解 ${quizScore}`;
  document.getElementById("qFeedback").textContent="";
  document.getElementById("qFeedback").className="feedback";
  document.getElementById("qNext").classList.add("hidden");
  let html="";
  if(q.img){html+=`<img class="qimg" src="${imgUrl(q.p)}" alt="?" id="qpic">`;}
  html+=`<div class="qprompt">${q.label}</div>`;
  if(q.reverse){
    html+=`<div class="statgrid">`+q.p.s.map((v,i)=>`<div><small>${STAT_LABELS[i]}</small><b>${v}</b></div>`).join("")+`</div>`;
    html+=`<div class="qprompt" style="font-size:13px">合計 ${q.p.total}</div>`;
  }
  if(!q.noMain && !q.reverse && !q.img){ /* ability->pokemon: nothing extra */ }
  html+=`<div class="choices">`+q.choices.map(c=>`<button class="choice">${c}</button>`).join("")+`</div>`;
  document.getElementById("qContent").innerHTML=html;
  if(q.img){const im=document.getElementById("qpic");imgFallback(im,q.p);}
  document.querySelectorAll("#qContent .choice").forEach(btn=>{
    btn.onclick=()=>answer(btn,q);
  });
}
function answer(btn,q){
  const correct=(btn.textContent===q.answer);
  document.querySelectorAll("#qContent .choice").forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.answer)b.classList.add("correct");
    else if(b===btn)b.classList.add("wrong");
  });
  const fb=document.getElementById("qFeedback");
  if(correct){quizScore++;fb.textContent="正解！ ⭕";fb.className="feedback ok";}
  else{fb.innerHTML=`不正解 ❌ 正解：<b>${q.answer}</b>（${q.p.jp}）`;fb.className="feedback ng";quizWrong.push(q);}
  document.getElementById("qScore").textContent=`正解 ${quizScore}`;
  const nb=document.getElementById("qNext");nb.classList.remove("hidden");
  nb.textContent=(quizIdx+1<quizQueue.length)?"次へ →":"結果を見る 🏁";
}
document.getElementById("qNext").onclick=()=>{
  quizIdx++;
  if(quizIdx<quizQueue.length)showQuestion();
  else showResult();
};
function showResult(){
  document.getElementById("quizPlay").classList.add("hidden");
  const res=document.getElementById("quizResult");res.classList.remove("hidden");
  const pct=Math.round(quizScore/quizQueue.length*100);
  document.getElementById("rScore").textContent=`${quizScore} / ${quizQueue.length}`;
  let msg=pct>=90?"完璧！🏆":pct>=70?"good！👍":pct>=50?"あと一歩💪":"復習しよう📖";
  document.getElementById("rDetail").textContent=`正答率 ${pct}% — ${msg}`;
  const rev=document.getElementById("rReview");
  if(quizWrong.length===0){rev.innerHTML=`<p class="muted" style="text-align:center">間違いなし！</p>`;}
  else{
    const seen=new Set();
    const items=quizWrong.filter(q=>{if(seen.has(q.p.r))return false;seen.add(q.p.r);return true;});
    rev.innerHTML=`<h3 style="color:var(--bad);font-size:13px">復習リスト（間違えたポケモン）</h3>`+
      items.map(q=>`<div class="chip" style="display:block;margin:6px 0">
        #${q.p.r} <b>${q.p.jp}</b>｜${q.p.t.map(t=>TYPE_JP[t]).join("・")}｜合計${q.p.total}・素早${q.p.s[5]}｜${q.p.ab[0]}</div>`).join("");
  }
}

};

const spName2base={};
(function(){ let o=""; P.forEach(p=>{ spName2base[p.jp]=p.s[5]; o+=`<option value="${p.jp}">#${p.r}・素早${p.s[5]}</option>`;

const spSt={L:{nature:1,rank:0,ranked:0},R:{nature:1,rank:0,ranked:0}};
function panelHTML(side){
  const lab=side==="L"?"左":"右";
  return `<div class="speedbox spside">
    <div class="sptitle ${side}">${lab}</div>
    <div class="sprow"><label>検索</label><input id="spSearch_${side}" list="spList" autocomplete="off" placeholder="ポケモン名"></div>
    <div class="sprow"><label>種族値</label><input id="spBase_${side}" type="number" min="1" max="255" value="102"></div>
    <div class="sprow"><label>性格</label><div class="btngroup" id="spNat_${side}">
      <button type="button" data-nat="1.1">▲</button><button type="button" data-nat="1" class="on">●</button><button type="button" data-nat="0.9">▼</button></div></div>
    <div class="sprow"><label>努力値</label><div class="stepgroup">
      <button type="button" data-ev="0">0</button><input id="spEv_${side}" type="number" min="0" max="32" value="32"><button type="button" data-ev="32">32</button></div></div>
    <div class="sprow"><label>ランク</label><div class="stepgroup">
      <button type="button" data-rk="-1">−</button><span id="spRankVal_${side}" class="stepval">0</span><button type="button" data-rk="1">＋</button></div></div>
    <div id="spResult_${side}" class="spresult"></div>
  </div>`;
}
document.getElementById("spCompare").innerHTML=panelHTML("L")+panelHTML("R");
function spStage(real,rank){ const m=rank>=0?(2+rank)/2:2/(2-rank); return Math.floor(real*m); }
function calcSide(side){
  const st=spSt[side];
  const base=Math.max(1,+document.getElementById("spBase_"+side).value||0);
  const pts=Math.min(32,Math.max(0,+document.getElementById("spEv_"+side).value||0));
  const ev=Math.min(252,pts*8);
  let real=Math.floor((base*2+31+Math.floor(ev/4))*50/100+5);  // 個体値31固定
  real=Math.floor(real*st.nature);
  const ranked=spStage(real,st.rank); st.ranked=ranked;
  const scarf=Math.floor(ranked*1.5), tail=Math.floor(ranked*2), para=Math.floor(ranked*0.5);
  const note=st.rank!==0?` <small>（ランク0なら ${real}）</small>`:"";
  document.getElementById("spResult_"+side).innerHTML=`
    <div class="spcard main"><span class="lbl">実数値${st.rank!==0?`（${st.rank>0?"+":""}${st.rank}）`:""}</span><span class="val">${ranked}${note}</span></div>
    <div class="spcard scarf"><span class="lbl">スカーフ ×1.5</span><span class="val">${scarf}</span></div>
    <div class="spcard tail"><span class="lbl">追い風 ×2</span><span class="val">${tail}</span></div>
    <div class="spcard para"><span class="lbl">まひ ×0.5</span><span class="val">${para}</span></div>`;
  updateVerdict();
}
function updateVerdict(){
  const L=spSt.L.ranked, R=spSt.R.ranked, d=Math.abs(L-R);
  const el=document.getElementById("spVerdict");
  if(L===R) el.innerHTML=`<span style="color:var(--sub)">同速（${L}）</span>`;
  else if(L>R) el.innerHTML=`<span style="color:var(--accent2)">◀ 左が速い</span> <span class="muted" style="font-weight:400">差 ${d}</span>`;
  else el.innerHTML=`<span style="color:var(--accent)">右が速い ▶</span> <span class="muted" style="font-weight:400">差 ${d}</span>`;
}
["L","R"].forEach(side=>{
  const panel=document.querySelectorAll("#spCompare .spside")[side==="L"?0:1];
  document.getElementById("spSearch_"+side).addEventListener("input",e=>{ const b=spName2base[e.target.value.trim()]; if(b){ document.getElementById("spBase_"+side).value=b; calcSide(side); } });
  document.getElementById("spBase_"+side).addEventListener("input",()=>calcSide(side));
  document.getElementById("spEv_"+side).addEventListener("input",()=>calcSide(side));
  panel.querySelectorAll("#spNat_"+side+" button").forEach(b=>b.onclick=()=>{
    panel.querySelectorAll("#spNat_"+side+" button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); spSt[side].nature=+b.dataset.nat; calcSide(side); });
  panel.querySelectorAll("[data-ev]").forEach(b=>b.onclick=()=>{ document.getElementById("spEv_"+side).value=b.dataset.ev; calcSide(side); });
  panel.querySelectorAll("[data-rk]").forEach(b=>b.onclick=()=>{

function statR(base,nat,pts,rank){ const ev=Math.min(252,pts*8); let r=Math.floor((base*2+31+Math.floor(ev/4))*50/100+5); r=Math.floor(r*nat); const m=rank>=0?(2+rank)/2:2/(2-rank); return Math.floor(r*m); }
function hpR(base,pts){ const ev=Math.min(252,pts*8); return Math.floor((base*2+31+Math.floor(ev/4))*50/100)+50+10; }

function grounded(types){ return !types.includes("flying"); }
function calcDmg(){
  const cat=dSt.cat;
  const power=Math.max(0,+$("dPow").value||0);
  const mt=$("dMoveType").value;
  const weather=$("dWeather").value, terrain=$("dTerrain").value, wall=$("dWall").value;
  const A=statR(Math.max(1,+$("dAtkBase").value||1),dSt.natA,+$("dEv_A").value||0,dSt.rankA);
  let D=statR(Math.max(1,+$("dDefBase").value||1),dSt.natD,+$("dEv_D").value||0,dSt.rankD);
  // 天候による防御補正（砂＝岩の特防1.5／雪＝氷の防御1.5）
  if(weather==="sand" && cat==="spec" && dSt.defT.includes("rock")) D=Math.floor(D*1.5);
  if(weather==="snow" && cat==="phys" && dSt.defT.includes("ice")) D=Math.floor(D*1.5);
  const HP=hpR(Math.max(1,+$("dHpBase").value||1),+$("dHpEv").value||0);
  const stab=dSt.atkT.includes(mt)?1.5:1;
  const e=effMult(mt,dSt.defT);
  const item=+$("dItem").value;
  const crit=$("dCrit").checked?1.5:1;
  const burn=($("dBurn").checked&&cat==="phys")?0.5:1;
  // 天候による技倍率
  let wMul=1;
  if(weather==="sun"){ if(mt==="fire")wMul=1.5; else if(mt==="water")wMul=0.5; }
  if(weather==="rain"){ if(mt==="water")wMul=1.5; else if(mt==="fire")wMul=0.5; }
  // フィールド（地に足がついている前提＝ひこう以外）
  let tMul=1; const atkGr=grounded(dSt.atkT), defGr=grounded(dSt.defT);
  if(terrain==="electric" && atkGr && mt==="electric") tMul=1.3;
  if(terrain==="grassy" && atkGr && mt==="grass") tMul=1.3;
  if(terrain==="psychic" && atkGr && mt==="psychic") tMul=1.3;
  if(terrain==="grassy" && defGr && mt==="ground") tMul=0.5;
  if(terrain==="misty" && defGr && mt==="dragon") tMul=0.5;
  // 壁（急所時は無効）
  let wallMul=1;
  if(crit===1){ if((wall==="reflect"&&cat==="phys")||(wall==="light"&&cat==="spec")||wall==="aurora") wallMul=0.5; }
  $("dDefTypes").textContent=dSt.defT.map(t=>TYPE_JP[t]).join("・")||"—";
  const res=$("dmgResult");
  const effLbl=e===0?'<span class="dmgeff" style="background:#5a5366;color:#fff">こうかなし（無効）</span>'
    :e>1?`<span class="dmgeff" style="background:#3ddc84;color:#06351c">こうかばつぐん ×${e}</span>`
    :e<1?`<span class="dmgeff" style="background:#ff8a5c;color:#3a0007">いまひとつ ×${e}</span>`
    :`<span class="dmgeff" style="background:var(--panel2);color:var(--sub)">等倍 ×1</span>`;
  const tags=[]; if(stab>1)tags.push("一致"); if(crit>1)tags.push("急所"); if(burn<1)tags.push("やけど");
  if(wMul!==1)tags.push("天候"); if(tMul!==1)tags.push("フィールド"); if(wallMul<1)tags.push("壁"); if(item>1)tags.push("道具");
  const tagLine=tags.length?`<div class="muted" style="font-size:12px;margin-top:6px">適用補正：${tags.join("・")}</div>`:"";
  if(power===0){ res.innerHTML=`${effLbl}<div class="dmgko">変化技／威力0</div>`; return; }
  if(e===0){ res.innerHTML=`${effLbl}<div class="dmgbig">0</div><div class="dmgko">ダメージを与えられない</div>`; return; }
  const base=Math.floor(Math.floor(22*power*A/D)/50)+2;
  const rolls=[];
  for(let r=85;r<=100;r++){ let d=base; d=Math.floor(d*crit); d=Math.floor(d*r/100); d=Math.floor(d*stab); d=Math.floor(d*e); d=Math.floor(d*burn); d=Math.floor(d*item); d=Math.floor(d*wMul); d=Math.floor(d*tMul); d=Math.floor(d*wallMul); rolls.push(Math.max(1,d)); }
  const mn=rolls[0],mx=rolls[15];
  const pMn=(mn/HP*100),pMx=(mx/HP*100);
  const fastest=Math.ceil(HP/mx), guaranteed=Math.ceil(HP/mn);
  let ko = fastest===guaranteed?`<span style="color:var(--bad)">確定${guaranteed}発</span>`
    :`<span style="color:var(--accent)">乱数${fastest}発</span> <span class="muted" style="font-size:14px;font-weight:400">（確定${guaranteed}発）</span>`;
  let extra="";
  if(fastest===1){ const cnt=rolls.filter(x=>x>=HP).length; extra=`<div class="muted" style="margin-top:4px">1発で倒せる確率 ${Math.round(cnt/16*100)}%</div>`; }
  res.innerHTML=`${effLbl}
    <div class="dmgbig">${mn} 〜 ${mx} <span style="font-size:15px;color:var(--sub)">ダメージ</span></div>
    <div class="dmgpct">相手のHP ${HP} の ${pMn.toFixed(1)}% 〜 ${pMx.toFixed(1)}%</div>
    <div class="dmgbarwrap"><div class="lo" style="width:${Math.min(100,pMn)}%"></div><div class="hi" style="width:${Math.min(100,pMx)}%"></div></div>
    <div class="dmgko">${ko}</div>${extra}${tagLine}`;
}
// イベント配線
$("dmgCompare").addEventListener("input",e=>{
  const t=e.target;
  if(t.id==="dSearch_A"){ const m=dmgIndex[t.value.trim()]; if(m){ dSt.atkS=m.s; dSt.atkT=m.t; refillBases(); } }
  if(t.id==="dSearch_D"){ const m=dmgIndex[t.value.trim()]; if(m){ dSt.defS=m.s; dSt.defT=m.t; refillBases(); } }
  if(t.id==="dMove"){ const m=MOVEDEX[t.value.trim()]; if(m){ $("dPow").value=m[2]; $("dMoveType").value=m[0];
    if(m[1]!=="x"){ const cat=m[1]==="s"?"spec":"phys"; dSt.cat=cat; document.querySelectorAll("#dCat button").forEach(x=>x.classList.toggle("on",x.dataset.cat===cat)); refillBases(); } } }
  calcDmg();
});
$("dmgCompare").addEventListener("change",calcDmg);
$("dmgField").addEventListener("change",calcDmg);
$("dmgCompare").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  if(b.dataset.cat){ dSt.cat=b.dataset.cat; document.querySelectorAll("#dCat button").forEach(x=>x.classList.toggle("on",x===b)); refillBases(); calcDmg(); }
  else if(b.dataset.nat){ const grp=b.parentElement; grp.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); if(grp.id==="dNat_A")dSt.natA=+b.dataset.nat; else dSt.natD=+b.dataset.nat; calcDmg(); }
  else if(b.dataset.ev){ const[id,v]=b.dataset.ev.split(":"); $(id).value=v; calcDmg(); }
  else if(b.dataset.rk){ const[side,delta]=b.dataset.rk.split(":"); const k=side==="A"?"rankA":"rankD"; dSt[k]=Math.min(6,Math.max(-6,dSt[k]+ +delta)); $("dRankVal_"+side).textContent=(dSt[k]>0?"+":"")+dSt[k]; calcDmg(); }
});

/* init */
renderList();
calcSpeed();
refillBases();
calcDmg();
</script>
</body>
</html>
